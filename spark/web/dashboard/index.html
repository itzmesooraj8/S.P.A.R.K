<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.P.A.R.K. — AI Operating System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Top Bar -->
    <header class="topbar">
        <div class="topbar-left">
            <span class="brand-dot pulse"></span>
            <span class="brand-name">S.P.A.R.K</span>
        </div>
        <div class="topbar-center">
            <span class="status-chip" id="groq-status">
                <span class="chip-dot green"></span>
                <span class="chip-label">Groq Live</span>
            </span>
            <span class="status-chip" id="memory-status">
                <span class="chip-dot blue"></span>
                <span class="chip-label">Memory Active</span>
            </span>
            <span class="status-chip" id="voice-status">
                <span class="chip-dot amber"></span>
                <span class="chip-label">Voice Standby</span>
            </span>
        </div>
        <div class="topbar-right">
            <span class="user-chip">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Sooraj</span>
            </span>
        </div>
    </header>

    <div class="main-layout">
        <!-- Left Sidebar -->
        <nav class="sidebar-left">
            <div class="nav-section">
                <div class="nav-label">Core</div>
                <button class="nav-item active" data-view="chat">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span>Chat</span>
                </button>
                <button class="nav-item" data-view="memory">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                        <path d="M2 17l10 5 10-5"></path>
                        <path d="M2 12l10 5 10-5"></path>
                    </svg>
                    <span>Memory</span>
                </button>
                <button class="nav-item" data-view="goals">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 8v8"></path>
                        <path d="M8 12h8"></path>
                    </svg>
                    <span>Goals</span>
                </button>
            </div>
            <div class="nav-section">
                <div class="nav-label">Actions</div>
                <button class="nav-item" data-view="desktop">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                    <span>Desktop</span>
                </button>
                <button class="nav-item" data-view="browser">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                    </svg>
                    <span>Browser</span>
                </button>
                <button class="nav-item" data-view="iot">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 3v12"></path>
                        <circle cx="18" cy="6" r="3"></circle>
                        <circle cx="6" cy="18" r="3"></circle>
                        <path d="M18 9a9 9 0 0 1-9 9"></path>
                    </svg>
                    <span>IoT/Home</span>
                </button>
            </div>
            <div class="nav-section">
                <div class="nav-label">System</div>
                <button class="nav-item" data-view="settings">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                    <span>Settings</span>
                </button>
                <button class="nav-item" data-view="logs">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span>Logs</span>
                </button>
            </div>
        </nav>

        <!-- Center Panel — Chat -->
        <main class="chat-panel" id="chat-view">
            <div class="chat-messages" id="chat-messages">
                <!-- Messages will be inserted here -->
            </div>
            <div class="chat-input-bar">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
                <button class="mic-btn" id="mic-btn" title="Voice input">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </button>
                <button class="send-btn" id="send-btn" title="Send message">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </main>

        <!-- Right Sidebar -->
        <aside class="sidebar-right">
            <!-- System Stats -->
            <div class="sidebar-section">
                <div class="section-label">System</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="stat-tests">136</div>
                        <div class="stat-label">Tests</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-boot">2.1s</div>
                        <div class="stat-label">Boot Time</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-version">v2.0</div>
                        <div class="stat-label">Version</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value"><span class="chip-dot green"></span> Live</div>
                        <div class="stat-label">Groq API</div>
                    </div>
                </div>
            </div>

            <!-- Module Status -->
            <div class="sidebar-section">
                <div class="section-label">Modules</div>
                <div class="module-list">
                    <div class="module-row">
                        <span class="module-dot green"></span>
                        <span class="module-name">LLM Bridge</span>
                    </div>
                    <div class="module-row">
                        <span class="module-dot green"></span>
                        <span class="module-name">Memory</span>
                    </div>
                    <div class="module-row">
                        <span class="module-dot green"></span>
                        <span class="module-name">Intent Router</span>
                    </div>
                    <div class="module-row">
                        <span class="module-dot amber"></span>
                        <span class="module-name">Screen/OCR</span>
                    </div>
                    <div class="module-row">
                        <span class="module-dot green"></span>
                        <span class="module-name">Browser</span>
                    </div>
                    <div class="module-row">
                        <span class="module-dot grey"></span>
                        <span class="module-name">Voice STT</span>
                    </div>
                    <div class="module-row">
                        <span class="module-dot grey"></span>
                        <span class="module-name">Voice TTS</span>
                    </div>
                    <div class="module-row">
                        <span class="module-dot grey"></span>
                        <span class="module-name">IoT/MQTT</span>
                    </div>
                </div>
            </div>

            <!-- Quick Commands -->
            <div class="sidebar-section">
                <div class="section-label">Quick Commands</div>
                <div class="quick-commands">
                    <button class="cmd-pill" data-cmd="open brave">open brave</button>
                    <button class="cmd-pill" data-cmd="latest news">latest news</button>
                    <button class="cmd-pill" data-cmd="what time">what time</button>
                    <button class="cmd-pill" data-cmd="remember...">remember...</button>
                    <button class="cmd-pill" data-cmd="open notepad">open notepad</button>
                    <button class="cmd-pill" data-cmd="search...">search...</button>
                </div>
            </div>
        </aside>
    </div>

    <!-- Voice Active Overlay -->
    <div class="voice-overlay" id="voice-overlay">
        <div class="voice-content">
            <div class="voice-waveform">
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
            </div>
            <div class="voice-status">Listening...</div>
            <div class="voice-transcript" id="voice-transcript"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
