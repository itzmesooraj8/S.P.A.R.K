<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>S.P.A.R.K. HUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <style>
    :root {
      --bg0: #04060d;
      --bg1: #07111f;
      --panel: rgba(8, 14, 24, 0.76);
      --panel-strong: rgba(5, 11, 20, 0.94);
      --line: rgba(122, 249, 255, 0.15);
      --line-strong: rgba(122, 249, 255, 0.3);
      --cyan: #7df9ff;
      --gold: #ffc85a;
      --crimson: #ff5c83;
      --text: #eff6ff;
      --muted: rgba(239, 246, 255, 0.62);
      --mono: 'IBM Plex Mono', monospace;
      --title: 'Space Grotesk', sans-serif;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.5);
      --radius: 18px;
      --radius-lg: 30px;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; margin: 0; background: radial-gradient(circle at center, #08111d 0%, #04060b 50%, #020307 100%); color: var(--text); font-family: var(--mono); overflow-x: hidden; overflow-y: auto; }
    body::before {
      content: '';
      position: fixed; inset: -12%;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 20% 18%, rgba(125,249,255,0.16), transparent 24%),
        radial-gradient(circle at 80% 12%, rgba(255,200,90,0.08), transparent 20%),
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: auto, auto, 64px 64px, 64px 64px;
      opacity: 0.58;
      filter: blur(0.4px);
    }
    body::after {
      content: '';
      position: fixed; inset: -6%;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 34%, rgba(125,249,255,0.12), transparent 26%),
        radial-gradient(circle at 50% 70%, rgba(255,92,131,0.06), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,0.03), transparent 16%, transparent 84%, rgba(255,255,255,0.02));
      mix-blend-mode: screen;
      opacity: 0.9;
    }

    body::before,
    body::after { animation: driftGrid 28s linear infinite; }

    @keyframes pulseIdle {
      0%, 100% { transform: scale(1); opacity: 0.72; }
      50% { transform: scale(1.08); opacity: 1; }
    }
    @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes redRipple { 0% { transform: scale(0.94); opacity: 0.4; } 70% { transform: scale(1.12); opacity: 0.08; } 100% { transform: scale(1.18); opacity: 0; } }
    @keyframes floaty { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes driftGrid { from { transform: translate3d(0, 0, 0); } to { transform: translate3d(-2%, -1%, 0); } }

    .app {
      position: relative;
      width: min(100%, 1800px);
      min-height: 100vh;
      margin: 0 auto;
      padding: clamp(12px, 1.5vw, 22px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: clamp(10px, 1.2vw, 16px);
      isolation: isolate;
    }

    .app::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background:
        radial-gradient(circle at 12% 16%, rgba(125,249,255,0.2), transparent 20%),
        radial-gradient(circle at 86% 10%, rgba(255,200,90,0.12), transparent 16%),
        radial-gradient(circle at 50% 54%, rgba(125,249,255,0.08), transparent 32%),
        linear-gradient(180deg, rgba(255,255,255,0.02), transparent 18%, transparent 84%, rgba(255,255,255,0.02));
      filter: blur(22px);
      opacity: 0.95;
    }

    .panel {
      position: relative;
      border: 1px solid rgba(125, 249, 255, 0.12);
      background:
        linear-gradient(180deg, rgba(9, 16, 28, 0.92), rgba(3, 8, 14, 0.96)),
        radial-gradient(circle at top, rgba(125,249,255,0.04), transparent 52%);
      box-shadow:
        0 18px 54px rgba(0, 0, 0, 0.34),
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        inset 0 0 0 1px rgba(125, 249, 255, 0.04);
      backdrop-filter: blur(18px) saturate(130%);
      overflow: hidden;
    }

    .panel::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(125,249,255,0.06), transparent 12%, transparent 88%, rgba(125,249,255,0.04)),
        linear-gradient(180deg, rgba(255,255,255,0.05), transparent 18%, transparent 82%, rgba(255,255,255,0.03));
      opacity: 0.95;
    }

    .top-bar {
      border-radius: 30px;
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr) auto;
      gap: clamp(10px, 1vw, 16px);
      align-items: center;
      padding: clamp(14px, 1.4vw, 20px) clamp(16px, 1.6vw, 24px);
      animation: fadeUp 0.6s ease both;
    }

    .brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .brand-mark {
      width: 18px;
      height: 18px;
      border-radius: 7px;
      background: linear-gradient(135deg, rgba(125,249,255,1), rgba(255,255,255,0.14));
      box-shadow: 0 0 22px rgba(125,249,255,0.24);
      transform: rotate(45deg);
      border: 1px solid rgba(125,249,255,0.52);
      flex: 0 0 auto;
    }
    .brand-copy { min-width: 0; }
    .brand-title {
      font-family: var(--title);
      letter-spacing: 0.3em;
      font-size: clamp(20px, 2.2vw, 30px);
      color: var(--cyan);
      text-shadow: 0 0 16px rgba(125,249,255,0.18);
      white-space: nowrap;
    }
    .brand-subtitle {
      margin-top: 4px;
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .system-line {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 10px;
      color: rgba(239,246,255,0.7);
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(125,249,255,0.12);
      background: rgba(125,249,255,0.03);
      white-space: nowrap;
    }
    .chip[data-state="online"] { color: var(--cyan); }
    .chip[data-state="thinking"] { color: var(--gold); }
    .chip[data-state="error"] { color: var(--crimson); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; box-shadow: 0 0 10px currentColor; animation: pulseIdle 1.8s infinite; }

    .clock { justify-self: end; font-family: var(--title); letter-spacing: 0.18em; font-size: 12px; text-transform: uppercase; color: rgba(231,243,251,0.84); }

    .workspace {
      display: grid;
      grid-template-columns: minmax(300px, 340px) minmax(0, 1fr) minmax(300px, 340px);
      grid-template-rows: minmax(0, 1fr);
      gap: clamp(10px, 1.1vw, 16px);
      min-height: 0;
    }

    .stack { display: grid; gap: clamp(10px, 1vw, 14px); min-height: 0; }
    .sidebar, .telemetry, .feed-shell, .composer-shell, .hero-shell { border-radius: 30px; }
    .sidebar { padding: clamp(12px, 1vw, 16px); display: grid; gap: clamp(10px, 1vw, 14px); animation: fadeUp 0.66s ease 0.03s both; }
    .telemetry { padding: clamp(12px, 1vw, 16px); display: grid; gap: clamp(10px, 1vw, 14px); animation: fadeUp 0.72s ease 0.06s both; }

    .section {
      border: 1px solid rgba(125,249,255,0.11);
      background: linear-gradient(180deg, rgba(125,249,255,0.03), rgba(125,249,255,0.015));
      border-radius: 20px;
      padding: 14px;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(231,243,251,0.6);
    }
    .section-head strong { color: var(--cyan); font-family: var(--title); letter-spacing: 0.22em; }
    .meter { display: grid; gap: 8px; margin-bottom: 12px; }
    .meter:last-child { margin-bottom: 0; }
    .meter-row { display: flex; justify-content: space-between; gap: 12px; align-items: center; font-size: 12px; color: var(--text); }
    .track { width: 100%; height: 10px; border-radius: 999px; background: rgba(239,246,255,0.06); overflow: hidden; border: 1px solid rgba(125,249,255,0.1); }
    .fill { width: 0%; height: 100%; background: linear-gradient(90deg, rgba(125,249,255,0.22), rgba(125,249,255,1)); box-shadow: 0 0 18px rgba(125,249,255,0.22); transition: width 220ms ease; }
    .fill.gold { background: linear-gradient(90deg, rgba(255,200,90,0.22), rgba(255,200,90,1)); box-shadow: 0 0 18px rgba(255,200,90,0.16); }

    .stat-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .stat {
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(125,249,255,0.11);
      background: rgba(125,249,255,0.024);
      min-width: 0;
    }
    .stat .k { color: rgba(231,243,251,0.56); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 8px; }
    .stat .v { font-family: var(--title); font-size: 20px; letter-spacing: 0.08em; color: var(--cyan); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .tile-grid { display: grid; gap: 10px; }
    .tile {
      border-radius: 16px;
      border: 1px solid rgba(125,249,255,0.11);
      background: rgba(125,249,255,0.024);
      padding: 12px 13px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      font-size: 12px;
    }
    .tile .label { color: rgba(231,243,251,0.72); letter-spacing: 0.16em; text-transform: uppercase; }
    .tile .value { color: var(--cyan); font-family: var(--title); letter-spacing: 0.1em; text-align: right; }
    .tile .value.gold { color: var(--gold); }

    .center {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: clamp(10px, 1vw, 14px);
      min-height: 0;
      animation: fadeUp 0.7s ease 0.05s both;
    }

    .hero-shell {
      padding: clamp(16px, 1.6vw, 22px);
      border: 1px solid rgba(125,249,255,0.11);
      background:
        radial-gradient(circle at 18% 18%, rgba(125,249,255,0.08), transparent 24%),
        radial-gradient(circle at 82% 12%, rgba(255,200,90,0.06), transparent 18%),
        linear-gradient(180deg, rgba(8, 16, 27, 0.82), rgba(2, 7, 14, 0.96));
      display: grid;
      gap: 14px;
      min-height: 0;
    }
    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .eyebrow { font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; color: rgba(231,243,251,0.58); }
    .hero-title {
      margin: 0;
      font-family: var(--title);
      font-size: clamp(24px, 2.9vw, 42px);
      line-height: 1.02;
      letter-spacing: 0.02em;
      max-width: 18ch;
    }
    .hero-title span { color: var(--cyan); }
    .hero-copy { margin: 0; max-width: 58ch; color: rgba(231,243,251,0.64); font-size: 14px; line-height: 1.72; }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag { padding: 7px 11px; border-radius: 999px; border: 1px solid rgba(125,249,255,0.12); background: rgba(125,249,255,0.03); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(239,246,255,0.86); }

    .orb-row {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(0, 1.1fr);
      gap: 16px;
      align-items: center;
      min-height: 0;
    }

    .orb-stage {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 320px;
      isolation: isolate;
    }
    .orb {
      position: relative;
      width: min(320px, 46vw);
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 0 34px rgba(125,249,255,0.3));
      animation: floaty 7s ease-in-out infinite;
    }
    .orb::before,
    .orb::after {
      content: '';
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      border: 1px solid rgba(125,249,255,0.16);
    }
    .orb::after {
      inset: 24%;
      border-color: rgba(125,249,255,0.2);
    }
    .orb-core {
      position: absolute;
      inset: 24%;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 45%, rgba(255,255,255,0.98) 0%, rgba(125,249,255,0.82) 18%, rgba(125,249,255,0.18) 52%, rgba(125,249,255,0.03) 70%, transparent 84%);
      box-shadow: inset 0 0 40px rgba(255,255,255,0.12), 0 0 66px rgba(125,249,255,0.22);
      transform-origin: center;
      transition: background 180ms ease, box-shadow 180ms ease;
    }
    .orb-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(125,249,255,0.18);
      background: conic-gradient(from 180deg, transparent 0 30%, rgba(125,249,255,0.08) 38%, rgba(125,249,255,0.34) 44%, transparent 52% 100%);
      animation: spinSlow 10s linear infinite;
      opacity: 0.88;
    }
    .orb-ring.secondary {
      inset: 12%;
      animation-duration: 16s;
      opacity: 0.64;
      border-color: rgba(125,249,255,0.1);
    }
    .orb-ring.micro {
      inset: 24%;
      animation-duration: 6s;
      animation-direction: reverse;
      opacity: 0.92;
    }
    .orb[data-state="idle"] .orb-core { animation: pulseIdle 2.8s ease-in-out infinite; background: radial-gradient(circle at 50% 45%, rgba(255,255,255,0.96) 0%, rgba(125,249,255,0.84) 20%, rgba(125,249,255,0.18) 56%, transparent 78%); }
    .orb[data-state="thinking"] .orb-core { background: radial-gradient(circle at 50% 45%, rgba(255,255,255,0.98) 0%, rgba(255,200,90,0.9) 22%, rgba(255,200,90,0.18) 58%, transparent 80%); box-shadow: inset 0 0 40px rgba(255,255,255,0.16), 0 0 66px rgba(255,200,90,0.16); }
    .orb[data-state="thinking"] .orb-ring { animation-duration: 3.6s; background: conic-gradient(from 180deg, transparent 0 28%, rgba(255,200,90,0.08) 38%, rgba(255,200,90,0.42) 44%, transparent 52% 100%); }
    .orb[data-state="error"] .orb-core { background: radial-gradient(circle at 50% 45%, rgba(255,255,255,0.92) 0%, rgba(255,92,131,0.92) 24%, rgba(255,92,131,0.18) 58%, transparent 82%); box-shadow: inset 0 0 40px rgba(255,255,255,0.12), 0 0 62px rgba(255,92,131,0.18); }
    .orb[data-state="error"] .orb-ring { background: conic-gradient(from 180deg, transparent 0 28%, rgba(255,92,131,0.08) 38%, rgba(255,92,131,0.42) 44%, transparent 52% 100%); animation-duration: 2.1s; }
    .orb[data-state="error"]::before,
    .orb[data-state="error"]::after { animation: redRipple 1.1s ease-out infinite; border-color: rgba(255,92,131,0.2); }

    .orb-meta {
      display: grid;
      gap: 10px;
      min-width: 0;
    }
    .orb-card {
      border-radius: 16px;
      border: 1px solid rgba(125,249,255,0.11);
      background: rgba(125,249,255,0.024);
      padding: 12px 14px;
    }
    .orb-card .k { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(231,243,251,0.56); margin-bottom: 8px; }
    .orb-card .v { font-family: var(--title); color: var(--cyan); letter-spacing: 0.08em; line-height: 1.3; }
    .orb-card .v.gold { color: var(--gold); }

    .feed-shell {
      border-radius: 30px;
      padding: 14px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      min-height: 0;
    }
    .feed-head { display: flex; justify-content: space-between; gap: 10px; align-items: center; text-transform: uppercase; letter-spacing: 0.18em; font-size: 11px; color: rgba(231,243,251,0.62); }
    .feed-head .mode { color: var(--cyan); font-family: var(--title); }
    .feed-list { display: flex; flex-direction: column; gap: 10px; overflow: auto; padding-right: 4px; }
    .msg { display: grid; gap: 8px; max-width: min(92%, 900px); align-self: flex-start; }
    .msg.you { align-self: flex-end; }
    .msg.system { align-self: center; max-width: 100%; }
    .bubble {
      border-radius: 18px;
      border: 1px solid rgba(125,249,255,0.11);
      background: rgba(4, 9, 16, 0.88);
      padding: 14px 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
      display: grid;
      gap: 8px;
    }
    .msg.you .bubble { background: linear-gradient(180deg, rgba(12, 22, 36, 0.98), rgba(4, 11, 18, 0.92)); border-color: rgba(125,249,255,0.2); }
    .msg.spark .bubble { background: linear-gradient(180deg, rgba(8, 18, 24, 0.95), rgba(3, 9, 14, 0.92)); border-color: rgba(125,249,255,0.16); }
    .msg.system .bubble { border-color: rgba(255,200,90,0.14); }
    .msg-top { display: flex; justify-content: space-between; gap: 12px; align-items: center; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(231,243,251,0.58); }
    .badge { font-family: var(--title); color: var(--cyan); }
    .msg.you .badge { color: var(--gold); }
    .msg.spark .badge { color: var(--cyan); }
    .msg-body { font-size: 13px; line-height: 1.68; white-space: pre-wrap; overflow-wrap: anywhere; color: rgba(231,243,251,0.94); }

    .composer-shell {
      border-radius: 30px;
      padding: 16px 18px;
      display: grid;
      gap: 12px;
      min-height: 0;
      backdrop-filter: blur(12px);
    }
    .composer-top { display: flex; justify-content: space-between; gap: 10px; align-items: center; flex-wrap: wrap; }
    .composer-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .composer-tag { padding: 7px 11px; border-radius: 999px; border: 1px solid rgba(125,249,255,0.12); background: rgba(125,249,255,0.03); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(239,246,255,0.82); }
    .composer-help { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(231,243,251,0.58); }
    .composer-row { display: grid; grid-template-columns: minmax(0, 1fr) auto auto; gap: 10px; align-items: end; }
    .input {
      width: 100%;
      min-height: 60px;
      max-height: 170px;
      resize: none;
      border-radius: 18px;
      border: 1px solid rgba(125,249,255,0.14);
      background: rgba(0, 5, 12, 0.9);
      color: var(--text);
      padding: 16px;
      outline: none;
      font-family: var(--mono);
      font-size: 15px;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }
    .input::placeholder { color: rgba(231,243,251,0.36); }
    .input:focus { border-color: rgba(125,249,255,0.38); box-shadow: 0 0 0 4px rgba(125,249,255,0.08); }
    .btn {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      border: 1px solid rgba(125,249,255,0.24);
      background: linear-gradient(180deg, rgba(6, 16, 26, 0.94), rgba(1, 6, 12, 1));
      color: var(--text);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 20px;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: rgba(125,249,255,0.42); box-shadow: 0 0 18px rgba(125,249,255,0.12); }
    .btn.active { color: var(--gold); border-color: rgba(255,200,90,0.34); box-shadow: 0 0 18px rgba(255,200,90,0.14); }
    .composer-bottom { display: flex; justify-content: space-between; gap: 10px; align-items: center; flex-wrap: wrap; color: rgba(231,243,251,0.58); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; }

    .bottom-bar {
      border-radius: 30px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      align-items: center;
      padding: 12px 16px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(231,243,251,0.66);
      animation: fadeUp 0.7s ease 0.15s both;
    }
    .bottom-bar strong { color: var(--cyan); font-family: var(--title); }

    .boot-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at center, rgba(125,249,255,0.08), rgba(0,0,0,0.94) 68%);
      backdrop-filter: blur(18px);
      transition: opacity 240ms ease, visibility 240ms ease;
    }
    .boot-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .boot-card { width: min(92vw, 560px); border-radius: 28px; border: 1px solid rgba(125,249,255,0.18); background: rgba(4, 11, 18, 0.96); box-shadow: 0 0 32px rgba(125,249,255,0.06), 0 0 110px rgba(0,0,0,0.36); padding: 22px; display: grid; gap: 14px; }
    .boot-title { font-family: var(--title); color: var(--cyan); letter-spacing: 0.28em; font-size: clamp(22px, 3vw, 34px); text-align: center; text-shadow: 0 0 14px rgba(125,249,255,0.22); }
    .boot-text { min-height: 84px; font-size: 13px; line-height: 1.8; color: rgba(231,243,251,0.92); white-space: pre-wrap; }
    .boot-progress { height: 10px; border-radius: 999px; overflow: hidden; border: 1px solid rgba(125,249,255,0.18); background: rgba(231,243,251,0.05); }
    .boot-progress span { display: block; width: 0%; height: 100%; background: linear-gradient(90deg, rgba(125,249,255,0.2), rgba(125,249,255,1)); box-shadow: 0 0 12px rgba(125,249,255,0.24); transition: width 240ms ease; }
    .boot-foot { display: flex; justify-content: space-between; gap: 12px; align-items: center; color: rgba(231,243,251,0.58); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; }

    .override {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: grid;
      place-items: center;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(8px);
    }
    .override-card { width: min(90vw, 820px); border-radius: 18px; border: 1px solid rgba(255,200,90,0.24); background: linear-gradient(135deg, rgba(9, 18, 28, 0.96), rgba(3, 9, 16, 0.96)); padding: 20px; box-shadow: 0 0 60px rgba(125,249,255,0.14); }
    .override-head { font-family: var(--title); letter-spacing: 0.24em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
    .override-body { display: grid; gap: 10px; color: rgba(231,243,251,0.9); font-size: 13px; line-height: 1.7; }
    .override-row { padding: 8px 0; border-bottom: 1px dotted rgba(125,249,255,0.15); color: rgba(125,249,255,0.92); word-break: break-all; }
    .override-row:last-child { border-bottom: 0; }

    @media (max-width: 1480px) {
      .workspace { grid-template-columns: minmax(280px, 0.94fr) minmax(0, 1.26fr) minmax(280px, 0.94fr); }
      .orb { width: min(290px, 44vw); }
    }
    @media (max-width: 1220px) {
      .app { min-height: 100dvh; }
      .workspace { grid-template-columns: 1fr; }
      .top-bar { grid-template-columns: 1fr; justify-items: start; }
      .clock { justify-self: start; }
      .orb-row { grid-template-columns: 1fr; }
      .orb-stage { min-height: 250px; }
      .feed-shell { min-height: 320px; }
    }
    @media (max-width: 860px) {
      .app { padding: 10px; }
      .composer-row { grid-template-columns: 1fr auto auto; }
      .bottom-bar { grid-template-columns: 1fr; }
      .stat-grid { grid-template-columns: 1fr; }
      .orb { width: min(260px, 72vw); }
      .hero-title { max-width: 12ch; }
      .hero-copy { font-size: 13px; }

    }

</head>
<body>
  <div id="root"></div>
  <script>
    const h = React.createElement;
    const { useEffect, useMemo, useRef, useState } = React;

    const BOOT_STEPS = [
      { stage: 'Stage 01', text: 'Initializing S.P.A.R.K. HUD core...', progress: 12 },
      { stage: 'Stage 02', text: 'Locking spatial telemetry grid...', progress: 34 },
      { stage: 'Stage 03', text: 'Syncing websockets and memory lane...', progress: 58 },
      { stage: 'Stage 04', text: 'Charging plasma core and command bar...', progress: 82 },
      { stage: 'Stage 05', text: 'Layer 4 HUD online.', progress: 100 },
    ];

    const TIER_ROWS = [
      ['Tier 0', 'Groq cloud gateway'],
      ['Tier 1', 'Ollama gemma3:4b'],
      ['Tier 2', 'Ollama gemma4'],
      ['Tier 3', 'Ollama qwen2.5:1.5b'],
    ];

    const TIER_PROMPTS = [
      'Cognitive gateway / cloud synthesis',
      'Local edge reasoning / safe routing',
      'Structural parsing / fallback logic',
      'Emergency mini / safe-mode output',
    ];

    const TOOL_LABELS = {
      web_search: 'Searching the web', get_news: 'Fetching live news', get_weather: 'Pulling weather data', execute_python: 'Running code',
      open_url: 'Opening target', open_app: 'Launching app', get_system_stats: 'Reading system state', get_clipboard: 'Reading clipboard', get_network_connections: 'Scanning network',
      read_screen: 'Reading screen', read_region: 'Inspecting region', control_device: 'Sending device command', spark_plan_and_execute: 'Planning multi-step action',
    };

    const wsUrl = (path) => `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${window.location.host}${path}`;
    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
    const nowClock = () => new Intl.DateTimeFormat([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }).format(new Date());
    const formatUptime = (value) => {
      if (value == null || value === '') return '--';
      if (typeof value === 'string') return value;
      const total = Number(value);
      if (!Number.isFinite(total)) return String(value);
      const seconds = Math.max(0, Math.floor(total));
      const days = Math.floor(seconds / 86400);
      const hours = Math.floor((seconds % 86400) / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      if (days > 0) return `${days}d ${hours}h ${minutes}m`;
      if (hours > 0) return `${hours}h ${minutes}m`;
      return `${minutes}m`;
    };

    function useInterval(callback, delay) {
      const saved = useRef(callback);
      useEffect(() => { saved.current = callback; }, [callback]);
      useEffect(() => {
        if (delay == null) return;
        const timer = window.setInterval(() => saved.current(), delay);
        return () => window.clearInterval(timer);
      }, [delay]);
    }

    function App() {
      const [clock, setClock] = useState(nowClock());
      const [bootStep, setBootStep] = useState(BOOT_STEPS[0]);
      const [bootHidden, setBootHidden] = useState(false);
      const [engine, setEngine] = useState({ label: 'BOOTING', state: 'thinking' });
      const [voice, setVoice] = useState({ label: 'VOICE READY', listening: false });
      const [links, setLinks] = useState({ ai: 'CONNECTING', sys: 'CONNECTING' });
      const [metrics, setMetrics] = useState({ cpu: 0, ram: 0, uptime: '--' });
      const [memoryCount, setMemoryCount] = useState(0);
      const [status, setStatus] = useState('AWAITING INPUT');
      const [feedState, setFeedState] = useState('IDLE');
      const [transcript, setTranscript] = useState('Booting S.P.A.R.K. HUD...');
      const [typing, setTyping] = useState(true);
      const [input, setInput] = useState('');
      const [messages, setMessages] = useState([
        { id: 'seed', sender: 'SYSTEM', body: 'SPARK HUD online. Connect to /ws/ai and /ws/system.', meta: nowClock(), kind: 'system' },
      ]);
      const [tools, setTools] = useState([{ name: 'System bootstrap', meta: 'DONE', kind: 'done' }]);
      const [widget, setWidget] = useState({ title: 'System Context', body: 'No payload yet.', meta: 'idle' });
      const [overridePayload, setOverridePayload] = useState(null);
      const [showBoot, setShowBoot] = useState(true);
      const aiSocketRef = useRef(null);
      const sysSocketRef = useRef(null);
      const feedRef = useRef(null);
      const listeningRef = useRef(false);

      const addMessage = (sender, body, kind = 'done') => {
        setMessages((current) => [...current.slice(-11), { id: `${Date.now()}-${Math.random()}`, sender, body, meta: nowClock(), kind }]);
      };

      const toolLabel = (name) => TOOL_LABELS[name] || name.replaceAll('_', ' ');

      const pushTool = (name, meta, kind = 'pending') => {
        const label = toolLabel(name);
        setTools((current) => {
          const next = current.filter((item) => item.name !== label).slice(-6);
          next.unshift({ name: label, meta, kind });
          return next;
        });
      };

      const setOrbState = (label, state) => setEngine({ label, state });

      const updateMetrics = (data = {}) => {
        const cpu = Number(data.cpu ?? data.cpu_percent ?? data.cpuUsage ?? 0);
        const ram = Number(data.ram ?? data.ram_percent ?? data.ramUsage ?? 0);
        setMetrics({
          cpu: clamp(Number.isFinite(cpu) ? cpu : 0, 0, 100),
          ram: clamp(Number.isFinite(ram) ? ram : 0, 0, 100),
          uptime: formatUptime(data.uptime ?? data.uptime_seconds ?? data.upTime ?? '--'),
        });
      };

      const fetchMemory = async () => {
        try {
          const response = await fetch('/memory');
          if (!response.ok) return;
          const payload = await response.json();
          const total = Number(payload.total ?? 0);
          setMemoryCount(Number.isFinite(total) ? total : 0);
        } catch (error) {
          console.warn('memory fetch failed', error);
        }
      };

      const connectSystemSocket = () => {
        const socket = new WebSocket(wsUrl('/ws/system'));
        sysSocketRef.current = socket;
        setLinks((current) => ({ ...current, sys: 'CONNECTING' }));
        socket.onopen = () => setLinks((current) => ({ ...current, sys: 'ONLINE' }));
        socket.onmessage = (event) => {
          try {
            const payload = JSON.parse(event.data);
            if (payload.type === 'signal_override') {
              setOverridePayload(payload);
              return;
            }
            if (payload.type === 'sys_metrics' || payload.cpu !== undefined || payload.ram !== undefined) {
              updateMetrics(payload.payload || payload);
            }
          } catch (error) {
            console.warn('system websocket parse failed', error);
          }
        };
        socket.onerror = () => setLinks((current) => ({ ...current, sys: 'ERROR' }));
        socket.onclose = () => {
          setLinks((current) => ({ ...current, sys: 'RECONNECTING' }));
          window.setTimeout(connectSystemSocket, 1800);
        };
      };

      const handleAIEvent = (raw) => {
        const type = String(raw?.type || '').toLowerCase();
        if (type === 'status') {
          const step = String(raw.state || raw.status || '').toLowerCase();
          if (step === 'thinking') { setOrbState('THINKING', 'thinking'); setFeedState('BUSY'); }
          if (step === 'idle' || step === 'done' || step === 'ready') { setOrbState('ONLINE', 'idle'); setFeedState('IDLE'); }
          return;
        }
        if (type === 'tool_execute' || type === 'tool_result') {
          const toolName = String(raw.tool || raw.name || '').trim() || 'tool';
          pushTool(toolName, type === 'tool_execute' ? 'PENDING' : 'DONE', type === 'tool_execute' ? 'pending' : 'done');
          if (type === 'tool_execute') {
            addMessage('SYSTEM', `${toolLabel(toolName)}...`, 'system');
          } else {
            const output = raw.output || raw.result || raw.content || 'Completed.';
            addMessage(toolName.toUpperCase(), `${toolLabel(toolName)}\n${output}`, 'done');
            if (toolName === 'memory_store' || toolName === 'store_memory') fetchMemory();
          }
          return;
        }
        if (type === 'widget') {
          setWidget({
            title: String(raw.widget || 'Widget'),
            body: typeof raw.data === 'string' ? raw.data : JSON.stringify(raw.data, null, 2),
            meta: 'live',
          });
          return;
        }
        if (type === 'response_token') {
          setTranscript((current) => `${String(current || '').replace('▋', '')}${raw.content || raw.token || ''}`);
          setTyping(true);
          return;
        }
        if (type === 'response_done') {
          const reply = raw.content || raw.response || raw.text || '';
          setTranscript(reply || 'Ready.');
          setTyping(false);
          addMessage('SPARK', reply || 'Ready.', 'done');
          setOrbState('ONLINE', 'idle');
          setFeedState('IDLE');
          fetchMemory();
          return;
        }
        if (type === 'error') {
          const message = raw.message || 'Neural core error.';
          setTranscript(message);
          setTyping(false);
          addMessage('SPARK', message, 'error');
          setOrbState('ERROR', 'error');
          setFeedState('IDLE');
          return;
        }
        if (type === 'done') {
          setTranscript(raw.content || 'Ready.');
          setTyping(false);
          setOrbState('ONLINE', 'idle');
          setFeedState('IDLE');
        }
      };

      const connectAISocket = () => {
        const socket = new WebSocket(wsUrl('/ws/ai'));
        aiSocketRef.current = socket;
        setLinks((current) => ({ ...current, ai: 'CONNECTING' }));
        socket.onopen = () => {
          setLinks((current) => ({ ...current, ai: 'ONLINE' }));
          setOrbState('ONLINE', 'idle');
          setStatus('AWAITING INPUT');
        };
        socket.onmessage = (event) => {
          try {
            handleAIEvent(JSON.parse(event.data));
          } catch (error) {
            console.warn('ai websocket parse failed', error);
          }
        };
        socket.onerror = () => setLinks((current) => ({ ...current, ai: 'ERROR' }));
        socket.onclose = () => {
          setLinks((current) => ({ ...current, ai: 'RECONNECTING' }));
          window.setTimeout(connectAISocket, 1800);
        };
      };

      const submitMessage = async (value) => {
        const text = String(value || '').trim();
        if (!text) return;
        addMessage('YOU', text, 'done');
        setOrbState('THINKING', 'thinking');
        setStatus('THINKING');
        setFeedState('BUSY');
        try {
          if (aiSocketRef.current && aiSocketRef.current.readyState === WebSocket.OPEN) {
            aiSocketRef.current.send(JSON.stringify({ message: text }));
            return;
          }
          const response = await fetch('/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: text }) });
          const payload = await response.json();
          const reply = payload.response || payload.reply || payload.content || 'No response.';
          setTranscript(reply);
          setTyping(false);
          addMessage('SPARK', reply, 'done');
          setOrbState('ONLINE', 'idle');
          setFeedState('IDLE');
          fetchMemory();
        } catch (error) {
          console.error(error);
          const fallback = 'Neural core error. Check backend logs or model routing.';
          setTranscript(fallback);
          setTyping(false);
          addMessage('SPARK', fallback, 'error');
          setOrbState('ERROR', 'error');
          setFeedState('IDLE');
        }
      };

      const listenForSpeech = async () => {
        if (listeningRef.current) return;
        listeningRef.current = true;
        setVoice({ label: 'LISTENING', listening: true });
        setTranscript('Listening for speech input...');
        setTyping(true);
        try {
          const response = await fetch('/listen', { method: 'POST' });
          const payload = await response.json();
          if (payload.error) {
            addMessage('SYSTEM', payload.error, 'system');
            setTranscript(payload.error);
            setTyping(false);
            return;
          }
          if (payload.transcript) {
            addMessage('VOICE', `Transcribed: ${payload.transcript}`, 'done');
            setTranscript(payload.transcript);
            setTyping(false);
          }
          if (payload.reply) {
            addMessage('SPARK', payload.reply, 'done');
            setTranscript(payload.reply);
            setTyping(false);
          }
          if (payload.tool_used) {
            pushTool(payload.tool_used, 'DONE', 'done');
          }
          fetchMemory();
        } catch (error) {
          console.error(error);
          addMessage('SYSTEM', 'Voice pipeline error.', 'error');
          setTranscript('Voice pipeline error.');
          setTyping(false);
        } finally {
          listeningRef.current = false;
          setVoice({ label: 'VOICE READY', listening: false });
        }
      };

      const sendMessage = async () => {
        const value = input;
        setInput('');
        await submitMessage(value);
      };

      useEffect(() => {
        const timer = window.setInterval(() => setClock(nowClock()), 1000);
        return () => window.clearInterval(timer);
      }, []);

      useInterval(() => {
        if (voice.listening || status === 'THINKING') return;
        const phrase = ['Ask SPARK anything.', 'Try a voice command.', 'System telemetry is live.', 'Message in plain language.'][Math.floor(Date.now() / 16000) % 4];
        setTranscript(phrase);
        setTyping(true);
      }, 16000);

      useEffect(() => {
        let index = 0;
        const timer = window.setInterval(() => {
          const step = BOOT_STEPS[index];
          if (!step) {
            window.clearInterval(timer);
            window.setTimeout(() => setBootHidden(true), 380);
            return;
          }
          setBootStep(step);
          index += 1;
        }, 430);
        return () => window.clearInterval(timer);
      }, []);

      useEffect(() => {
        connectAISocket();
        connectSystemSocket();
        fetchMemory();
        window.setTimeout(() => {
          setTranscript('Boot complete. Ask SPARK a question or send a command.');
          setTyping(false);
        }, 1800);
        return () => {
          try { aiSocketRef.current && aiSocketRef.current.close(); } catch (error) {}
          try { sysSocketRef.current && sysSocketRef.current.close(); } catch (error) {}
        };
      }, []);

      useEffect(() => {
        if (feedRef.current) feedRef.current.scrollTop = feedRef.current.scrollHeight;
      }, [messages]);

      const signalLines = useMemo(() => {
        if (!overridePayload) return [];
        const connections = overridePayload?.payload?.active_connections || overridePayload?.connections || [];
        return connections.map((item, index) => `${index + 1}. ${item.target || 'local'} | ${item.type || 'UNKNOWN'} | ESTABLISHED`);
      }, [overridePayload]);

      return h(React.Fragment, null,
        !bootHidden && h('div', { className: 'boot-overlay' },
          h('div', { className: 'boot-card' },
            h('div', { className: 'boot-title' }, 'S.P.A.R.K.'),
            h('div', { className: 'boot-text' }, bootStep.text),
            h('div', { className: 'boot-progress' }, h('span', { style: { width: `${bootStep.progress}%` } })),
            h('div', { className: 'boot-foot' }, h('span', null, 'Systems Check'), h('span', null, bootStep.stage))
          )
        ),
        overridePayload && h('div', { className: 'override', onClick: () => setOverridePayload(null) },
          h('div', { className: 'override-card', onClick: (event) => event.stopPropagation() },
            h('div', { className: 'override-head' }, 'Signal Override Terminal'),
            h('div', { className: 'override-body' },
              h('div', null, 'Active connections: ', String(signalLines.length)),
              signalLines.length ? signalLines.map((row) => h('div', { className: 'override-row', key: row }, row)) : h('div', { className: 'override-row' }, 'No active connections detected.'),
              h('div', { style: { display: 'flex', justifyContent: 'space-between', gap: '12px', color: 'rgba(231,243,251,0.68)', textTransform: 'uppercase', letterSpacing: '0.16em', fontSize: '10px' } },
                h('span', null, 'Signal strength: 100%'),
                h('span', null, 'Latency: 0ms')
              )
            )
          )
        ),
        h('div', { className: 'app' },
          h('header', { className: 'top-bar panel' },
            h('div', { className: 'brand' },
              h('div', { className: 'brand-mark' }),
              h('div', { className: 'brand-copy' },
                h('div', { className: 'brand-title' }, 'S.P.A.R.K.'),
                h('div', { className: 'brand-subtitle' }, 'cybernetic telemetry workspace')
              )
            ),
            h('div', { className: 'system-line' },
              h('div', { className: 'chip', 'data-state': engine.state }, h('span', { className: 'dot' }), h('span', null, `Region: ${engine.label}`)),
              h('div', { className: 'chip', 'data-state': voice.listening ? 'thinking' : 'online' }, h('span', { className: 'dot' }), h('span', null, `Voice: ${voice.label}`)),
              h('div', { className: 'chip', 'data-state': links.ai === 'ERROR' ? 'error' : links.ai === 'ONLINE' ? 'online' : 'thinking' }, h('span', { className: 'dot' }), h('span', null, `AI WS: ${links.ai}`)),
              h('div', { className: 'chip', 'data-state': links.sys === 'ERROR' ? 'error' : links.sys === 'ONLINE' ? 'online' : 'thinking' }, h('span', { className: 'dot' }), h('span', null, `SYS WS: ${links.sys}`))
            ),
            h('div', { className: 'clock' }, clock)
          ),

          h('section', { className: 'workspace' },
            h('aside', { className: 'stack' },
              h('div', { className: 'sidebar panel' },
                h('div', { className: 'section' },
                  h('div', { className: 'section-head' }, h('strong', null, 'Hardware Vital'), h('span', null, 'LIVE')),
                  h('div', { className: 'meter' }, h('div', { className: 'meter-row' }, h('span', null, 'CPU'), h('span', null, `${metrics.cpu.toFixed(1)}%`)), h('div', { className: 'track' }, h('div', { className: 'fill', style: { width: `${metrics.cpu}%` } }))),
                  h('div', { className: 'meter' }, h('div', { className: 'meter-row' }, h('span', null, 'RAM'), h('span', null, `${metrics.ram.toFixed(1)}%`)), h('div', { className: 'track' }, h('div', { className: 'fill gold', style: { width: `${metrics.ram}%` } }))),
                  h('div', { className: 'stat-grid' },
                    h('div', { className: 'stat' }, h('div', { className: 'k' }, 'Uptime'), h('div', { className: 'v' }, metrics.uptime)),
                    h('div', { className: 'stat' }, h('div', { className: 'k' }, 'Memory'), h('div', { className: 'v' }, memoryCount))
                  )
                ),
                h('div', { className: 'section' },
                  h('div', { className: 'section-head' }, h('strong', null, 'Thread Core'), h('span', null, 'READY')),
                  h('div', { className: 'tile-grid' },
                    h('div', { className: 'tile' }, h('span', { className: 'label' }, 'Active'), h('span', { className: 'value' }, 'Groq API')),
                    h('div', { className: 'tile' }, h('span', { className: 'label' }, 'Handoff'), h('span', { className: 'value gold' }, 'Local cascade')),
                    h('div', { className: 'tile' }, h('span', { className: 'label' }, 'Mode'), h('span', { className: 'value' }, 'Hybrid brain'))
                  )
                ),
                h('div', { className: 'section' },
                  h('div', { className: 'section-head' }, h('strong', null, 'Hybrid Tiers'), h('span', null, 'MAP')),
                  h('div', { className: 'tile-grid' },
                    TIER_ROWS.map((row) => h('div', { className: 'tile', key: row[0] }, h('span', { className: 'label' }, row[0]), h('span', { className: 'value' }, row[1])))
                  )
                )
              )
            ),

            h('main', { className: 'center' },
              h('section', { className: 'hero-shell panel' },
                h('div', { className: 'hero-top' },
                  h('div', null,
                    h('div', { className: 'eyebrow' }, 'S.P.A.R.K. Live Interface Matrix'),
                    h('h1', { className: 'hero-title' }, 'System core is ', h('span', null, 'online')),
                    h('p', { className: 'hero-copy' }, 'This workspace stays bound to live websocket, chat, voice, and memory lanes. The layout expands and collapses by available space so it stays readable on wide monitors, laptops, and smaller screens.')
                  ),
                  h('div', { className: 'tags' },
                    h('span', { className: 'tag' }, 'Live data driven'),
                    h('span', { className: 'tag' }, 'Adaptive grid'),
                    h('span', { className: 'tag' }, 'Responsive by design')
                  )
                ),
                h('div', { className: 'orb-row' },
                  h('div', { className: 'orb-stage' },
                    h('div', { className: 'orb', 'data-state': engine.state },
                      h('div', { className: 'orb-ring' }),
                      h('div', { className: 'orb-ring secondary' }),
                      h('div', { className: 'orb-ring micro' }),
                      h('div', { className: 'orb-core' })
                    )
                  ),
                  h('div', { className: 'orb-meta' },
                    h('div', { className: 'orb-card' }, h('div', { className: 'k' }, 'State Engine'), h('div', { className: 'v' }, engine.label)),
                    h('div', { className: 'orb-card' }, h('div', { className: 'k' }, 'Telemetry'), h('div', { className: 'v' }, `CPU ${metrics.cpu.toFixed(1)}%  •  RAM ${metrics.ram.toFixed(1)}%`)),
                    h('div', { className: 'orb-card' }, h('div', { className: 'k' }, 'Cascade'), h('div', { className: 'v gold' }, 'Groq → Local fallback chain'))
                  )
                )
              ),

              h('section', { className: 'feed-shell panel' },
                h('div', { className: 'feed-head' }, h('span', null, 'Transaction Monitor Panel'), h('span', { className: 'mode' }, status), h('span', null, feedState)),
                h('div', { className: 'feed-list', ref: feedRef },
                  messages.map((message) => h('article', { className: `msg ${message.sender.toLowerCase()}`, key: message.id },
                    h('div', { className: 'bubble' },
                      h('div', { className: 'msg-top' }, h('span', { className: 'badge' }, message.sender), h('span', null, message.meta)),
                      h('div', { className: 'msg-body' }, message.body)
                    )
                  ))
                )
              ),

              h('section', { className: 'composer-shell panel' },
                h('div', { className: 'composer-top' },
                  h('div', { className: 'composer-tags' },
                    h('span', { className: 'composer-tag' }, 'Ask anything'),
                    h('span', { className: 'composer-tag' }, 'Voice mode'),
                    h('span', { className: 'composer-tag' }, 'System status')
                  ),
                  h('div', { className: 'composer-help' }, voice.listening ? 'Speak now, live capture enabled' : 'Press mic or hit Enter to transmit')
                ),
                h('div', { className: 'composer-row' },
                  h('textarea', {
                    className: 'input',
                    value: input,
                    placeholder: 'Message S.P.A.R.K....',
                    onChange: (event) => setInput(event.target.value),
                    onKeyDown: (event) => {
                      if (event.key === 'Enter' && !event.shiftKey) {
                        event.preventDefault();
                        sendMessage();
                      }
                    },
                  }),
                  h('button', { className: 'btn', type: 'button', onClick: sendMessage, title: 'Send message', 'aria-label': 'Send message' }, '➤'),
                  h('button', { className: `btn ${voice.listening ? 'active' : ''}`, type: 'button', onClick: listenForSpeech, title: 'Speak to SPARK', 'aria-label': 'Speak to SPARK' }, '🎙')
                ),
                h('div', { className: 'composer-bottom' },
                  h('span', null, 'Memory count ', h('strong', null, String(memoryCount))),
                  h('span', null, 'AI lane ', h('strong', null, links.ai)),
                  h('span', null, 'System lane ', h('strong', null, links.sys))
                )
              )
            ),

            h('aside', { className: 'stack' },
              h('div', { className: 'telemetry panel' },
                h('div', { className: 'section' },
                  h('div', { className: 'section-head' }, h('strong', null, 'Connection'), h('span', null, 'WS')),
                  h('div', { className: 'tile-grid' },
                    h('div', { className: 'tile' }, h('span', { className: 'label' }, 'AI WebSocket'), h('span', { className: 'value' }, links.ai)),
                    h('div', { className: 'tile' }, h('span', { className: 'label' }, 'System WebSocket'), h('span', { className: 'value' }, links.sys))
                  )
                ),
                h('div', { className: 'section' },
                  h('div', { className: 'section-head' }, h('strong', null, 'Cascade Notes'), h('span', null, 'JSON')),
                  h('div', { className: 'tile-grid' },
                    TIER_PROMPTS.map((text, index) => h('div', { className: 'tile', key: text }, h('span', { className: 'label' }, `Tier ${index}`), h('span', { className: 'value' }, text)))
                  )
                ),
                h('div', { className: 'section' },
                  h('div', { className: 'section-head' }, h('strong', null, 'System Context'), h('span', null, 'LIVE')),
                  h('div', { className: 'tile-grid' },
                    h('div', { className: 'tile' }, h('span', { className: 'label' }, 'Transcript'), h('span', { className: 'value' }, typing ? 'Typing' : 'Stable')),
                    h('div', { className: 'tile' }, h('span', { className: 'label' }, 'Uptime'), h('span', { className: 'value' }, metrics.uptime)),
                    h('div', { className: 'tile' }, h('span', { className: 'label' }, 'Chat status'), h('span', { className: 'value' }, status))
                  )
                ),
                h('div', { className: 'section' },
                  h('div', { className: 'section-head' }, h('strong', null, 'Active Tools'), h('span', null, String(tools.length))),
                  h('div', { className: 'tile-grid' },
                    tools.map((tool) => h('div', { className: 'tile', key: `${tool.name}-${tool.meta}` }, h('span', { className: 'label' }, tool.name), h('span', { className: 'value' }, tool.meta)))
                  )
                ),
                h('div', { className: 'section' },
                  h('div', { className: 'section-head' }, h('strong', null, 'Transaction Stream'), h('span', null, 'READY')),
                  h('div', { className: 'tile-grid' },
                    h('div', { className: 'tile' }, h('span', { className: 'label' }, 'System'), h('span', { className: 'value' }, 'Boot complete')),
                    h('div', { className: 'tile' }, h('span', { className: 'label' }, 'Input'), h('span', { className: 'value' }, 'Reactive')),
                    h('div', { className: 'tile' }, h('span', { className: 'label' }, 'Output'), h('span', { className: 'value' }, 'Typed stream'))
                  )
                )
              )
            )
          ),

          h('footer', { className: 'bottom-bar panel' },
            h('div', null, 'Memory: ', h('strong', null, `${memoryCount} items`)),
            h('div', null, 'Uptime: ', h('strong', null, metrics.uptime)),
            h('div', null, 'Build: ', h('strong', null, 'Adaptive HUD'))
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
