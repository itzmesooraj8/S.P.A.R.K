.<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARK Signal Override — Commandeering System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><defs><pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0,255,200,0.03)" stroke-width="0.5"/></pattern></defs><rect width="100" height="100" fill="%230a0a0a"/><rect width="100" height="100" fill="url(%23grid)"/></svg>');
            background-attachment: fixed;
            font-family: 'Courier New', monospace;
            color: #00ffc8;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            text-shadow: 0 0 10px rgba(0, 255, 200, 0.5);
        }
        
        .header {
            background: linear-gradient(to bottom, rgba(0, 255, 200, 0.1), transparent);
            border-bottom: 2px solid #00ffc8;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.2);
        }
        
        .header-title {
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .signal-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        
        .signal-dot {
            width: 8px;
            height: 8px;
            background: #00ffc8;
            border-radius: 50%;
            animation: pulse 1s infinite;
            box-shadow: 0 0 10px #00ffc8;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .signal-text {
            font-size: 11px;
            letter-spacing: 1px;
        }
        
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 16px;
            gap: 16px;
        }
        
        .panel {
            background: rgba(0, 255, 200, 0.03);
            border: 1px solid rgba(0, 255, 200, 0.2);
            border-radius: 4px;
            padding: 12px;
            box-shadow: inset 0 0 10px rgba(0, 255, 200, 0.05);
        }
        
        .section-title {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00cc99;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px dotted rgba(0, 255, 200, 0.3);
        }
        
        .commandeer-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00ffc8, #00cc99);
            color: #000;
            border: none;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 200, 0.5);
        }
        
        .commandeer-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 255, 200, 0.8);
        }
        
        .commandeer-btn:active {
            transform: translateY(0);
        }
        
        .commandeer-btn.loading {
            background: linear-gradient(135deg, #00aa88, #008866);
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .connection-list {
            font-size: 10px;
            line-height: 1.6;
            color: #00ffaa;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
        }
        
        .connection-item {
            padding: 4px 0;
            border-bottom: 1px solid rgba(0, 255, 200, 0.1);
            word-break: break-all;
        }
        
        .connection-item:last-child {
            border-bottom: none;
        }
        
        .status-badge {
            display: inline-block;
            padding: 2px 6px;
            background: rgba(0, 255, 200, 0.2);
            border: 1px solid #00ffc8;
            border-radius: 3px;
            font-size: 9px;
            margin-right: 4px;
        }
        
        .status-ok {
            background: rgba(0, 200, 100, 0.2);
            border-color: #00cc99;
            color: #00ffaa;
        }
        
        .radar {
            width: 100%;
            height: 150px;
            background: radial-gradient(circle, rgba(0, 255, 200, 0.1) 0%, rgba(0, 255, 200, 0.05) 50%, transparent 100%);
            border: 1px solid rgba(0, 255, 200, 0.3);
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0 auto;
            box-shadow: inset 0 0 20px rgba(0, 255, 200, 0.1);
        }
        
        .radar-circle {
            position: absolute;
            border: 1px solid rgba(0, 255, 200, 0.2);
            border-radius: 50%;
        }
        
        .radar-blip {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #00ffc8;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ffc8;
            animation: radarScan 3s infinite;
        }
        
        @keyframes radarScan {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .radar-text {
            position: absolute;
            font-size: 9px;
            color: rgba(0, 255, 200, 0.4);
            text-align: center;
            z-index: 10;
        }
        
        .footer {
            padding: 12px 16px;
            border-top: 1px solid rgba(0, 255, 200, 0.2);
            text-align: center;
            font-size: 10px;
            color: rgba(0, 255, 200, 0.5);
            background: rgba(0, 0, 0, 0.3);
        }
        
        .footer-version {
            letter-spacing: 1px;
        }
        
        @media (max-width: 480px) {
            .header-title {
                font-size: 12px;
            }
            .container {
                padding: 12px;
                gap: 12px;
            }
            .panel {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">SPARK Signal Override</div>
        <div class="signal-indicator">
            <div class="signal-dot"></div>
            <div class="signal-text">CONNECTED</div>
        </div>
    </div>
    
    <div class="container">
        <div class="panel">
            <div class="section-title">Commandeer Display</div>
            <button class="commandeer-btn" id="commandeerBtn">▶ Initiate Signal Override</button>
        </div>
        
        <div class="panel">
            <div class="section-title">Active Connections</div>
            <div class="connection-list" id="connectionList">
                <div class="connection-item">
                    <span class="status-badge status-ok">ACTIVE</span>
                    Initializing connection monitor...
                </div>
            </div>
        </div>
        
        <div class="panel">
            <div class="section-title">System Radar</div>
            <div class="radar">
                <svg style="position: absolute; width: 100%; height: 100%;" id="radarSvg">
                    <circle cx="50%" cy="50%" r="20%" fill="none" stroke="rgba(0,255,200,0.2)" stroke-width="0.5"/>
                    <circle cx="50%" cy="50%" r="40%" fill="none" stroke="rgba(0,255,200,0.2)" stroke-width="0.5"/>
                    <circle cx="50%" cy="50%" r="60%" fill="none" stroke="rgba(0,255,200,0.2)" stroke-width="0.5"/>
                    <line x1="50%" y1="10%" x2="50%" y2="90%" stroke="rgba(0,255,200,0.1)" stroke-width="0.5"/>
                    <line x1="10%" y1="50%" x2="90%" y2="50%" stroke="rgba(0,255,200,0.1)" stroke-width="0.5"/>
                </svg>
                <div class="radar-text">SPARK SYSTEMS</div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <div class="footer-version">S.P.A.R.K. Industries Signal Override Protocol v1.0</div>
    </div>

    <script>
        const SPARK_TOKEN = localStorage.getItem('spark_token') || 'default-token';
        const API_HOST = window.location.origin;
        
        const commandeerBtn = document.getElementById('commandeerBtn');
        const connectionList = document.getElementById('connectionList');
        
        // Fetch and update active connections
        async function updateConnections() {
            try {
                const response = await fetch('/api/runtime/orchestrator', {
                    headers: { 'X-SPARK-Token': SPARK_TOKEN }
                });
                if (!response.ok) return;
                
                const data = await response.json();
                const connections = data.active_connections || [];
                
                if (connections.length === 0) {
                    connectionList.innerHTML = '<div class="connection-item"><span class="status-badge status-ok">IDLE</span>No active connections</div>';
                    return;
                }
                
                connectionList.innerHTML = connections.map(conn => `
                    <div class="connection-item">
                        <span class="status-badge status-ok">ACTIVE</span>
                        ${conn.type || 'connection'}: ${(conn.target || 'local').substring(0, 40)}
                    </div>
                `).join('');
            } catch (error) {
                connectionList.innerHTML = '<div class="connection-item"><span class="status-badge">ERROR</span>Failed to fetch connections</div>';
            }
        }
        
        // Commandeer display action
        commandeerBtn.addEventListener('click', async () => {
            commandeerBtn.classList.add('loading');
            commandeerBtn.textContent = '⟳ Commandeering...';
            
            try {
                const response = await fetch('/api/override/cast', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-SPARK-Token': SPARK_TOKEN
                    },
                    body: JSON.stringify({
                        target_url: window.location.origin,
                        payload: {
                            timestamp: new Date().toISOString(),
                            initiator: 'mobile_override',
                            display_state: 'terminal'
                        }
                    })
                });
                
                if (response.ok) {
                    commandeerBtn.classList.remove('loading');
                    commandeerBtn.textContent = '✓ Signal Cast Complete';
                    setTimeout(() => {
                        commandeerBtn.textContent = '▶ Initiate Signal Override';
                    }, 2000);
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                commandeerBtn.classList.remove('loading');
                commandeerBtn.textContent = '✗ Signal Override Failed';
                console.error('Override error:', error);
                setTimeout(() => {
                    commandeerBtn.textContent = '▶ Initiate Signal Override';
                }, 2000);
            }
        });
        
        // Update connections on load and periodically
        updateConnections();
        setInterval(updateConnections, 5000);
        
        // Store token if provided via query param
        const params = new URLSearchParams(window.location.search);
        if (params.has('token')) {
            localStorage.setItem('spark_token', params.get('token'));
        }
    </script>
</body>
</html>
