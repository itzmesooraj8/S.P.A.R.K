services:
  spark-api:
    build:
      context: .
    environment:
      SPARK_HOST: 0.0.0.0
      SPARK_PORT: 8000
      SPARK_SECURITY_AUDIT_LOG: /app/spark_dev_memory/security_audit.jsonl
      SPARK_AUTH_SECRET: ${SPARK_AUTH_SECRET:?set SPARK_AUTH_SECRET}
      SPARK_OPERATOR_USERNAME: ${SPARK_OPERATOR_USERNAME:-operator}
      SPARK_OPERATOR_PASSWORD_SHA256: ${SPARK_OPERATOR_PASSWORD_SHA256:?set SPARK_OPERATOR_PASSWORD_SHA256}
      SPARK_ACCESS_TOKEN_TTL_SECONDS: ${SPARK_ACCESS_TOKEN_TTL_SECONDS:-3600}
      SPARK_REFRESH_TOKEN_TTL_SECONDS: ${SPARK_REFRESH_TOKEN_TTL_SECONDS:-86400}
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://spark:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/spark
    ports:
      - "8000:8080"
    volumes:
      - spark-memory:/app/spark_dev_memory
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: spark
      POSTGRES_USER: spark
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spark -d spark"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  spark-memory:
  redis-data:
  postgres-data:
